name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openspace
          POSTGRES_USER: openspace
          POSTGRES_PASSWORD: openspace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openspace -d openspace"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      API_PORT: 3001
      DATABASE_URL: postgresql://openspace:openspace@localhost:5432/openspace?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: 1234567890abcdef
      JWT_REFRESH_SECRET: abcdef1234567890
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      EMAIL_VERIFICATION_TTL_MINUTES: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Prisma generate
        run: pnpm --filter @openspace/api run prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Prisma migrate
        run: pnpm --filter @openspace/api run prisma:migrate:deploy

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e-mock:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @openspace/web exec playwright install --with-deps chromium

      - name: Test E2E Mock
        run: pnpm test:web:e2e:mock

      - name: Upload Playwright Artifacts (mock)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-mock
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore

  e2e-fullstack:
    runs-on: ubuntu-latest
    needs: quality
    env:
      OPENSPACE_E2E_POSTGRES_PORT: 55432
      POSTGRES_PORT: 55432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Start Docker Compose for E2E Full-stack
        run: docker compose -f infra/docker/docker-compose.yml up -d --wait --wait-timeout 120

      - name: Prisma migrate E2E schema
        env:
          DATABASE_URL: postgresql://openspace:openspace@localhost:${{ env.POSTGRES_PORT }}/openspace?schema=e2e_playwright
        run: pnpm --filter @openspace/api prisma:migrate:deploy

      - name: Install Playwright Chromium
        run: pnpm --filter @openspace/web exec playwright install --with-deps chromium

      - name: Test E2E Full-stack
        run: pnpm test:web:e2e:fullstack

      - name: Upload Playwright Artifacts (fullstack)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-fullstack
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore

      - name: Shutdown Docker Compose
        if: always()
        run: docker compose -f infra/docker/docker-compose.yml down -v
